name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes
        run: python -m unittest discover -s tests -v

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    env:
      CI_REGISTRY_IMAGE: ${{ secrets.CI_REGISTRY_IMAGE }}
      CI_COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no registry
        run: echo "${{ secrets.CI_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.CI_REGISTRY_USER }}" --password-stdin "${{ secrets.CI_REGISTRY }}"

      - name: Build da imagem
        run: docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .

      - name: Push da imagem com SHA
        run: docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

      - name: Push da imagem latest
        run: docker push "$CI_REGISTRY_IMAGE:latest"