name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes
        run: python -m unittest discover -s tests -v

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    env:
      CI_REGISTRY_IMAGE: ${{ secrets.CI_REGISTRY_IMAGE }}
      CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
      CI_REGISTRY_USER: ${{ secrets.CI_REGISTRY_USER }}
      CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
      CI_COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no registry
        if: env.CI_REGISTRY != '' && env.CI_REGISTRY_USER != '' && env.CI_REGISTRY_PASSWORD != '' && env.CI_REGISTRY_IMAGE != ''
        run: echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

      - name: Pull da imagem latest
        if: env.CI_REGISTRY_IMAGE != ''
        run: docker pull "$CI_REGISTRY_IMAGE:latest" || true

      - name: Build da imagem
        if: env.CI_REGISTRY_IMAGE != ''
        run: docker build --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$CI_REGISTRY_IMAGE:latest" --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" --tag "$CI_REGISTRY_IMAGE:latest" .

      - name: Push da imagem com SHA
        if: env.CI_REGISTRY_IMAGE != ''
        run: docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

      - name: Push da imagem latest
        if: env.CI_REGISTRY_IMAGE != ''
        run: docker push "$CI_REGISTRY_IMAGE:latest"